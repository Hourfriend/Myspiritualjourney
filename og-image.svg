<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#07070f"/>
      <stop offset="100%" stop-color="#0c0b18"/>
    </linearGradient>

    <!-- Gold text gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e8c97a"/>
      <stop offset="50%"  stop-color="#c9aa72"/>
      <stop offset="100%" stop-color="#b8945a"/>
    </linearGradient>

    <!-- Nebula glows -->
    <radialGradient id="nebula1" cx="20%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="#7ec6d4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7ec6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="82%" cy="72%" r="45%">
      <stop offset="0%"   stop-color="#c9aa72" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#c9aa72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="55%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#6a3d9a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6a3d9a" stop-opacity="0"/>
    </radialGradient>

    <!-- Center title glow -->
    <radialGradient id="titleGlow" cx="50%" cy="48%" r="38%">
      <stop offset="0%"   stop-color="#c9aa72" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9aa72" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#000009" stop-opacity="0.72"/>
    </radialGradient>

    <!-- Soft blur filter for glows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Nebula layers -->
  <rect width="1200" height="630" fill="url(#nebula1)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>
  <rect width="1200" height="630" fill="url(#nebula3)"/>
  <rect width="1200" height="630" fill="url(#titleGlow)"/>

  <!-- ── Stars ── -->
  <!-- Bright stars -->
  <circle cx="72"   cy="48"  r="1.4" fill="#e8dfc8" opacity="0.85"/>
  <circle cx="198"  cy="112" r="1.1" fill="#d8cdb8" opacity="0.70"/>
  <circle cx="340"  cy="28"  r="1.6" fill="#f0e8d0" opacity="0.90"/>
  <circle cx="480"  cy="74"  r="0.9" fill="#c8d8e0" opacity="0.65"/>
  <circle cx="590"  cy="18"  r="1.3" fill="#e0d8c8" opacity="0.80"/>
  <circle cx="720"  cy="55"  r="1.0" fill="#d0e0e8" opacity="0.60"/>
  <circle cx="880"  cy="30"  r="1.5" fill="#f0e8d0" opacity="0.88"/>
  <circle cx="1010" cy="80"  r="1.2" fill="#e8dfc8" opacity="0.72"/>
  <circle cx="1120" cy="42"  r="1.0" fill="#c8d8e0" opacity="0.65"/>
  <circle cx="1160" cy="130" r="1.3" fill="#e0d8c8" opacity="0.78"/>
  <circle cx="44"   cy="190" r="0.8" fill="#d0d8e0" opacity="0.55"/>
  <circle cx="130"  cy="260" r="1.4" fill="#e8dfc8" opacity="0.80"/>
  <circle cx="220"  cy="310" r="0.9" fill="#d8cdb8" opacity="0.60"/>
  <circle cx="55"   cy="400" r="1.1" fill="#c8d8e0" opacity="0.68"/>
  <circle cx="160"  cy="460" r="0.8" fill="#e0d8c8" opacity="0.55"/>
  <circle cx="80"   cy="540" r="1.5" fill="#f0e8d0" opacity="0.82"/>
  <circle cx="210"  cy="590" r="1.0" fill="#e8dfc8" opacity="0.70"/>
  <circle cx="310"  cy="570" r="0.9" fill="#d0d8e0" opacity="0.58"/>
  <circle cx="420"  cy="600" r="1.3" fill="#d8cdb8" opacity="0.74"/>
  <circle cx="520"  cy="558" r="0.7" fill="#e0d8c8" opacity="0.50"/>
  <circle cx="650"  cy="608" r="1.1" fill="#c8d8e0" opacity="0.65"/>
  <circle cx="760"  cy="578" r="0.9" fill="#f0e8d0" opacity="0.72"/>
  <circle cx="870"  cy="598" r="1.4" fill="#e8dfc8" opacity="0.80"/>
  <circle cx="980"  cy="565" r="0.8" fill="#d8cdb8" opacity="0.58"/>
  <circle cx="1060" cy="590" r="1.2" fill="#e0d8c8" opacity="0.70"/>
  <circle cx="1140" cy="545" r="1.0" fill="#c8d8e0" opacity="0.62"/>
  <circle cx="1180" cy="610" r="0.9" fill="#d0d8e0" opacity="0.58"/>
  <circle cx="1050" cy="480" r="1.3" fill="#f0e8d0" opacity="0.78"/>
  <circle cx="1100" cy="360" r="0.8" fill="#e8dfc8" opacity="0.55"/>
  <circle cx="1170" cy="280" r="1.5" fill="#e0d8c8" opacity="0.85"/>
  <circle cx="1090" cy="200" r="1.0" fill="#c8d8e0" opacity="0.62"/>
  <circle cx="980"  cy="155" r="1.2" fill="#d8cdb8" opacity="0.72"/>
  <circle cx="850"  cy="100" r="0.9" fill="#e8dfc8" opacity="0.60"/>
  <circle cx="640"  cy="88"  r="1.4" fill="#f0e8d0" opacity="0.82"/>
  <!-- Mid-field faint stars -->
  <circle cx="290"  cy="175" r="0.7" fill="#c8d8e0" opacity="0.42"/>
  <circle cx="450"  cy="200" r="0.6" fill="#e0d8c8" opacity="0.38"/>
  <circle cx="610"  cy="160" r="0.8" fill="#d8cdb8" opacity="0.45"/>
  <circle cx="760"  cy="195" r="0.6" fill="#c8d8e0" opacity="0.40"/>
  <circle cx="900"  cy="220" r="0.7" fill="#e8dfc8" opacity="0.44"/>
  <circle cx="380"  cy="500" r="0.6" fill="#d0d8e0" opacity="0.38"/>
  <circle cx="540"  cy="520" r="0.7" fill="#e0d8c8" opacity="0.40"/>
  <circle cx="700"  cy="505" r="0.6" fill="#c8d8e0" opacity="0.36"/>
  <circle cx="810"  cy="510" r="0.8" fill="#d8cdb8" opacity="0.45"/>
  <!-- A couple bright accent stars with cross-glow -->
  <g filter="url(#glow)">
    <circle cx="340" cy="28"  r="1.8" fill="#fffae8" opacity="0.95"/>
    <circle cx="880" cy="30"  r="1.9" fill="#fffae8" opacity="0.92"/>
    <circle cx="1170" cy="280" r="1.7" fill="#e8f4ff" opacity="0.88"/>
  </g>

  <!-- ── Decorative horizontal rules ── -->
  <line x1="100" y1="420" x2="480" y2="420" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.25"/>
  <line x1="720" y1="420" x2="1100" y2="420" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.25"/>

  <!-- ── Small eyebrow label ── -->
  <text
    x="600" y="188"
    font-family="'Georgia', serif"
    font-size="13"
    font-weight="400"
    fill="#c9aa72"
    opacity="0.75"
    text-anchor="middle"
    letter-spacing="5"
  >AN INNER ATLAS</text>

  <!-- ── Main title glow underneath ── -->
  <text
    x="600" y="318"
    font-family="'Georgia', serif"
    font-size="112"
    font-weight="300"
    fill="#c9aa72"
    text-anchor="middle"
    opacity="0.08"
    filter="url(#softglow)"
  >A Map of the Unseen</text>

  <!-- ── Main title — "A Map of" ── -->
  <text
    x="600" y="308"
    font-family="'Georgia', serif"
    font-size="88"
    font-weight="300"
    fill="#ddd5c4"
    text-anchor="middle"
    letter-spacing="-1"
    font-style="normal"
  >A Map of</text>

  <!-- ── Main title — "the Unseen" with gold italic ── -->
  <text
    x="600" y="398"
    font-family="'Georgia', serif"
    font-size="88"
    font-weight="300"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="-1"
    font-style="italic"
  >the Unseen</text>

  <!-- ── Subtitle ── -->
  <text
    x="600" y="464"
    font-family="'Georgia', serif"
    font-size="19"
    font-weight="300"
    fill="#8a7f6e"
    text-anchor="middle"
    font-style="italic"
    letter-spacing="0.5"
  >This is not everything about me. But it is part of why I see the world the way I do.</text>

  <!-- ── Small decorative dots ── -->
  <circle cx="548" cy="488" r="2.5" fill="#c9aa72" opacity="0.4"/>
  <circle cx="600" cy="488" r="2.5" fill="#c9aa72" opacity="0.4"/>
  <circle cx="652" cy="488" r="2.5" fill="#c9aa72" opacity="0.4"/>

  <!-- Vignette overlay -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Thin gold border frame -->
  <rect x="18" y="18" width="1164" height="594" fill="none" stroke="#c9aa72" stroke-width="0.6" opacity="0.18"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#c9aa72" stroke-width="0.3" opacity="0.10"/>
</svg>
